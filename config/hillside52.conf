# ---  DISPLAY SETTINGS  ---
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=n
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# BUGFIX: Prevent screen freezes during sustained typing
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Disable WPM widget to prevent SPI bus overload during rapid typing
CONFIG_ZMK_WIDGET_WPM_STATUS=n

# Disable external power toggling to prevent cutting power to the nice!view
CONFIG_ZMK_EXT_POWER=n

# ---  BATTERY SETTINGS  ---
# This allows the battery level to be read and sent to the display/host
CONFIG_ZMK_BATTERY_REPORTING=y

# --- BLUETOOTH SETTINGS --- 
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_PHY_2M=n
CONFIG_BT_MAX_PAIRED=6
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Enable N-Key Rollover
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y

# Enable ZMK logging
CONFIG_ZMK_USB_LOGGING=y

# Optional: Increase the log buffer size if logs are being truncated
CONFIG_LOG_BUFFER_SIZE=2048