# ---  DISPLAY SETTINGS  ---
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=n
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# ---  BATTERY SETTINGS  ---
# This allows the battery level to be read and sent to the display/host
CONFIG_ZMK_BATTERY_REPORTING=y

# --- BLUETOOTH SETTINGS --- 
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_PHY_2M=n
CONFIG_BT_MAX_PAIRED=6
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Increase the system workqueue stack size to handle rapid events
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Increase the main thread stack size
CONFIG_MAIN_STACK_SIZE=2048

# Enable N-Key Rolloverf
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y