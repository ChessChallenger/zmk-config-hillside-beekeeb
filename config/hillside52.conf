# ---  DISPLAY SETTINGS  ---
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=n
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Disable WPM widget to prevent SPI bus overload during rapid typing
CONFIG_ZMK_WIDGET_WPM_STATUS=n

# BUGFIX: Prevent screen freezes during sustained typing by giving the display its own thread
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# --- BLUETOOTH SETTINGS --- 
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_PHY_2M=n
CONFIG_BT_MAX_PAIRED=6
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Enable N-Key Rollover
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y

# Increase the system workqueue stack size to handle complex hold-tap logic
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# --- BATTERY & POWER ---
# Enable external power to ensure the nice!view display stays powered correctly
CONFIG_ZMK_EXT_POWER=y
# Reporting for the display widgets
CONFIG_ZMK_BATTERY_REPORTING=y